syntax = "proto3";

option csharp_namespace = "Integration.Grpc";

package microsoftUsers;

service MicrosoftUser{
	rpc CreateMicrosoftUser(MicrosoftUserRequest) returns (MicrosoftUserResponse);
	rpc RemoveMicrosoftUser(RemoveMicrosoftUserRequest) returns (RemoveMicrosoftUserResponse);
}

message MicrosoftUserRequest{
	string fullUpn = 1;
	string usageLocation = 2;
	string password = 3;
	string displayName = 4;
	string config = 5;
}

message RemoveMicrosoftUserRequest{
	string fullUpn = 1;
	string config = 2;
}

message MicrosoftUserResponse{
	string userId = 1;
}

message RemoveMicrosoftUserResponse{
	bool removed = 1;
}
