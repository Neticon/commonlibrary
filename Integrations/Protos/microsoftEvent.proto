syntax = "proto3";

option csharp_namespace = "Integration.Grpc";

package microsoftEvents;

service MicrosoftEvents{
	rpc CreateEvent(MicrosoftEventRequest) returns (MicrosoftEventResponse);
	rpc UpdateEvent(UpdateMicrosoftEventRequest) returns (MicrosoftEventResponse);
	rpc CancelEvent(UpdateMicrosoftEventRequest) returns (MicrosoftEventResponse);
}

message MicrosoftEventRequest{
	EventAttende attende = 1;
	string subject = 2;
	string startUtc = 3;
	string endUtc = 4;
	string organizerUpnLocal = 5;
	string externalId = 6;
	string org_code = 7;
}

message EventAttende{
	string email = 1;
	string first_name = 2;
	string last_name = 3;
}

message MicrosoftEventResponse{
	string meeting_url = 1;
	string meeting_id = 2;
}

message UpdateMicrosoftEventRequest{
	string meeting_id = 1;
	string organizerUpnLocal = 2;
	optional string startUtc = 3;
	optional string endUtc = 4;
}